name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  test:
    name: Bazel test (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Bazel
        uses: ./.github/actions/setup-bazel

      - name: Run tests
        run: bazel test //... --test_output=errors

      - name: Shutdown Bazel
        if: always()
        uses: ./.github/actions/shutdown-bazel
        with:
          # Only the canonical main-branch build writes the cache; PRs restore-only.
          cache-save: ${{ github.ref == 'refs/heads/main' }}
